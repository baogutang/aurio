<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8a5f"/>
      <stop offset="1" stop-color="#ff6a3d"/>
    </linearGradient>
    <radialGradient id="aura" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#5ad19a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5ad19a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
    <clipPath id="tile"><rect width="192" height="192" rx="44"/></clipPath>
  </defs>

  <!-- tile + dot grid -->
  <rect width="192" height="192" rx="44" fill="#0a0a0b"/>
  <g clip-path="url(#tile)">
    <rect width="192" height="192" fill="url(#dots)"/>
    <rect x="40" y="20" width="112" height="112" fill="url(#aura)"/>
  </g>

  <!-- sound rings -->
  <g fill="none" stroke="#5ad19a" stroke-linecap="round">
    <path d="M70 44 A38 38 0 0 1 122 44" stroke-width="5" stroke-opacity="0.85"/>
    <path d="M58 38 A54 54 0 0 1 134 38" stroke-width="5" stroke-opacity="0.4"/>
  </g>

  <!-- antenna -->
  <line x1="96" y1="78" x2="96" y2="52" stroke="#5ad19a" stroke-width="6" stroke-linecap="round"/>
  <circle cx="96" cy="48" r="7.5" fill="#eafff2" filter="url(#glow)"/>

  <!-- body -->
  <rect x="52" y="74" width="88" height="84" rx="30" fill="url(#body)"/>
  <rect x="66" y="120" width="60" height="26" rx="13" fill="#5ad19a" fill-opacity="0.85"/>

  <!-- eyes -->
  <g fill="#1a1008">
    <circle cx="80" cy="104" r="8.5"/>
    <circle cx="112" cy="104" r="8.5"/>
  </g>
  <g fill="#ffffff">
    <circle cx="77" cy="101" r="2.6"/>
    <circle cx="109" cy="101" r="2.6"/>
  </g>
</svg>
