name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck and test
        if: matrix.os == 'ubuntu-latest'
        run: npm run typecheck:web && npm test

      - name: Audit production dependencies
        if: matrix.os == 'ubuntu-latest'
        run: npm run audit:prod

      - name: Build web frontend
        run: npm run build:web

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Publish desktop artifacts
        run: npm run dist -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aurio-${{ matrix.os }}
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.yml
            release/*.blockmap

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --latest \
            --title "${GITHUB_REF_NAME#v}" \
            --notes "Automated Aurio desktop release."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
