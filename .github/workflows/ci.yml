name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install server deps
        run: npm ci
        env:
          # No need to download the Electron binary just to lint/import the server.
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Smoke-import the server (catches import/syntax errors)
        run: node -e "import('./server/index.js').then(() => console.log('server import ok'))"

      - name: Typecheck web frontend
        working-directory: web
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Run web unit tests
        working-directory: web
        run: npm test

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Build the web frontend
        working-directory: web
        run: npm run build
