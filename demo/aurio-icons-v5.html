<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aurio Icons v5 · 真实 App 语境</title>
  <style>
    :root {
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
      --mono: 'SF Mono', ui-monospace, Menlo, monospace;
      --accent: #ff6a3d;
      --accent-rgb: 255, 106, 61;
      --hi: #5ad19a;
      --hi-rgb: 90, 209, 154;
      --bg: #0a0a0a;
      --card: #141414;
      --border: rgba(255,255,255,.1);
      --text: #f5f5f7;
      --muted: #98989d;
      --matrix-fg: #f5f5f7;
      --dot-surface-bg: #040404;
      --glass-border: rgba(255,255,255,.12);
      --inset-bg: rgba(255,255,255,.03);
    }
    [data-theme="light"] {
      --bg: #e8e8ed;
      --card: #fff;
      --border: rgba(0,0,0,.08);
      --text: #1d1d1f;
      --muted: #86868b;
      --matrix-fg: #1d1d1f;
      --dot-surface-bg: #efefef;
      --glass-border: rgba(0,0,0,.1);
      --inset-bg: rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1rem 3rem;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 420px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 1.5rem; }
    header h1 { font-size: 20px; font-weight: 650; letter-spacing: -0.02em; }
    header p { font-size: 12px; color: var(--muted); margin-top: 0.4rem; line-height: 1.5; }

    section {
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 1.1rem 1.2rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    section h2 {
      font-size: 11px; font-weight: 600; color: var(--muted);
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: .35rem;
    }
    section .hint { font-size: 11px; color: var(--muted); margin-bottom: .85rem; line-height: 1.45; }

    .ctrls { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: .85rem; }
    .ctrl {
      font: 500 11px/1 var(--font);
      padding: 5px 10px; border-radius: 7px; border: none;
      background: var(--inset-bg); color: var(--text); cursor: pointer;
    }
    .ctrl.on { background: var(--accent); color: #fff; }

    /* ── App mock (matches index.css) ── */
    .app-mock {
      border-radius: 22px;
      border: 1px solid var(--glass-border);
      background: var(--dot-surface-bg);
      background-image: radial-gradient(rgba(255,255,255,.04) 0.65px, transparent 0.65px);
      background-size: 5px 5px;
      padding: 1.5rem 1rem 1.25rem;
      text-align: center;
    }
    [data-theme="light"] .app-mock {
      background-image: radial-gradient(rgba(0,0,0,.06) 0.65px, transparent 0.65px);
    }
    .matrix-grid {
      --md: 6px;
      --mg: calc(var(--md) * 0.55);
      display: flex; align-items: center; justify-content: center;
      gap: calc(var(--md) * 1.6);
    }
    .matrix-digit {
      display: grid;
      grid-template-columns: repeat(5, var(--md));
      gap: var(--mg);
      align-content: center;
    }
    .matrix-colon {
      display: grid;
      grid-template-rows: repeat(7, var(--md));
      gap: var(--mg);
      margin: 0 calc(var(--md) * -0.2);
      align-content: center;
    }
    .matrix-pixel {
      width: var(--md); height: var(--md);
      border-radius: 50%; background: transparent;
    }
    .matrix-pixel.on { background: var(--matrix-fg); }
    .mock-weekday { margin: .85rem 0 .15rem; font-size: .78rem; color: var(--muted); letter-spacing: .06em; }
    .mock-date { font-size: .62rem; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); opacity: .7; }
    .mock-status {
      display: inline-flex; align-items: center; gap: .4rem;
      margin: 1rem 0 1.25rem;
      font-size: .6rem; font-weight: 600; letter-spacing: .28em; text-transform: uppercase; color: var(--muted);
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgb(var(--hi-rgb));
      box-shadow: 0 0 10px rgba(var(--hi-rgb),.75);
    }

    /* ── Transport (production CSS) ── */
    .transport-row {
      display: flex; align-items: center; justify-content: center; gap: 1rem;
      position: relative;
    }
    .transport-ring {
      position: absolute; width: 58px; height: 58px; border-radius: 50%;
      border: 1.5px solid rgba(var(--accent-rgb),.35);
      pointer-events: none;
    }
    .transport-cluster { display: flex; align-items: center; gap: .5rem; }
    .transport {
      display: flex; align-items: center; justify-content: center;
      width: 46px; height: 46px; border-radius: 50%;
      color: var(--matrix-fg); background: var(--inset-bg);
      border: 1px solid var(--glass-border);
    }
    .transport.liked { color: rgb(var(--hi-rgb)); }
    .play-btn {
      display: flex; align-items: center; justify-content: center;
      width: 58px; height: 58px; border-radius: 50%; border: none;
      color: #fff;
      background: linear-gradient(145deg, #ff7a50, rgb(var(--accent-rgb)));
      box-shadow: 0 6px 24px rgba(var(--accent-rgb),.4), inset 0 1px 0 rgba(255,255,255,.22);
    }
    .play-btn.live {
      box-shadow: 0 8px 32px rgba(var(--accent-rgb),.55), 0 0 0 6px rgba(var(--accent-rgb),.12), inset 0 1px 0 rgba(255,255,255,.25);
    }
    .play-btn .matrix-pixel.on {
      background: #fff;
      box-shadow: 0 0 6px rgba(255,255,255,.45);
    }

    /* icon matrix inside buttons */
    .icon-matrix {
      display: grid;
      grid-template-columns: repeat(5, var(--imd));
      gap: var(--img);
    }
    .icon-matrix .matrix-pixel.on { background: currentColor; }
    .ghost-icon { --imd: 4.5px; --img: calc(var(--imd) * 0.5); }
    .play-icon { --imd: 5.2px; --img: calc(var(--imd) * 0.5); }

    /* ── Dock ── */
    .icons-row { display: flex; gap: 1.25rem; justify-content: center; flex-wrap: wrap; margin-bottom: .75rem; }
    .ic { text-align: center; }
    .ic canvas { display: block; border-radius: 22.5%; }
    .ic small { display: block; margin-top: 5px; font-size: 10px; color: var(--muted); }
    .dock {
      display: flex; align-items: flex-end; justify-content: center; gap: 9px;
      padding: 11px 16px 9px; border-radius: 16px;
      background: rgba(255,255,255,.22);
      backdrop-filter: blur(24px) saturate(1.5);
      border: 1px solid rgba(255,255,255,.35);
    }
    [data-theme="light"] .dock { background: rgba(255,255,255,.55); }
    .dock-f { width: 48px; height: 48px; border-radius: 10px; background: rgba(120,120,128,.2); }
    .dock canvas { width: 48px; height: 48px; }

    /* ── Menu bar ── */
    .bar {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 4px 12px; border-radius: 6px;
      background: rgba(22,22,22,.92);
    }
    .bar-f { width: 14px; height: 14px; border-radius: 3px; background: rgba(255,255,255,.18); }
    .trays { display: flex; gap: 12px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
    .trays span { display: block; font-size: 9px; color: var(--muted); font-family: var(--mono); margin-top: 3px; text-align: center; }
    .trays canvas { display: block; background: rgba(22,22,22,.92); border-radius: 4px; padding: 3px 5px; }

    .note {
      margin-top: 1rem; padding: 11px 13px; border-radius: 11px;
      background: rgba(var(--accent-rgb),.07);
      border: 1px solid rgba(var(--accent-rgb),.14);
      font-size: 11px; color: var(--muted); line-height: 1.55;
    }
    .note strong { color: var(--text); }
  </style>
</head>
<body data-theme="dark">
  <div class="wrap">
    <header>
      <h1>Aurio Icons v5</h1>
      <p>在<strong>真实 App 界面</strong>里预览 · 5×7 圆点与 DotMatrixClock 同规格<br>Dock 极简圆点吉祥物 · 菜单栏单色剪影</p>
    </header>

    <section>
      <h2>App 内预览</h2>
      <p class="hint">先看控件在待机时钟下方的实际比例，再决定要不要落地</p>
      <div class="ctrls">
        <button class="ctrl" id="cTheme" type="button">浅色</button>
        <button class="ctrl" id="cPlay" type="button">播放</button>
        <button class="ctrl" id="cLike" type="button">喜欢</button>
      </div>
      <div class="app-mock" id="appMock"></div>
    </section>

    <section>
      <h2>Dock 图标</h2>
      <p class="hint">7 列圆点剪影 · 奶白 squircle · macOS 并排</p>
      <div class="icons-row" id="iconsRow"></div>
      <div class="dock" id="dock"></div>
    </section>

    <section>
      <h2>菜单栏</h2>
      <p class="hint">18×18 单色 · 播放态底条</p>
      <div style="text-align:center">
        <div class="bar">
          <span class="bar-f"></span>
          <canvas id="trayLive" width="18" height="18"></canvas>
          <span class="bar-f"></span>
        </div>
        <div class="trays" id="trays"></div>
      </div>
    </section>

    <p class="note"><strong>v5 相对 v4：</strong>圆点尺寸对齐时钟（不再用 3px 微点）；5×7 字模与 DotMatrixClock 一致；Dock 去掉 12×13 方块宠，改为 7 列发光圆点；Dislike 改为横线（非圆圈）。</p>
  </div>

  <script>
    /** 5×7 — same grid as DotMatrixClock.tsx */
    const G = {
      play: ['00000','01100','01110','01111','01110','01100','00000'],
      pause: ['11011','11011','11011','11011','11011','11011','11011'],
      prev: ['10000','10000','11100','11100','11100','10000','10000'],
      next: ['00001','00001','00111','00111','00111','00001','00001'],
      heart: ['01010','11111','11111','01110','00100','00000','00000'],
      minus: ['00000','00000','00000','11111','00000','00000','00000'],
    };

    function matrixFrom(rows, cls = '') {
      const el = document.createElement('div');
      el.className = 'icon-matrix ' + cls;
      for (const row of rows) {
        for (const bit of row) {
          const p = document.createElement('span');
          p.className = 'matrix-pixel' + (bit === '1' ? ' on' : '');
          el.appendChild(p);
        }
      }
      return el;
    }

    function clockGap() {
      const digits = '1247'.split('');
      const grid = document.createElement('div');
      grid.className = 'matrix-grid';
      for (const d of digits.slice(0, 2)) grid.appendChild(clockDigit(d));
      grid.appendChild(clockColon());
      for (const d of digits.slice(2)) grid.appendChild(clockDigit(d));
      return grid;
    }
    const CLOCK = {
      '1': ['00100','01100','00100','00100','00100','00100','01110'],
      '2': ['01110','10001','00001','00010','00100','01000','11111'],
      '4': ['00010','00110','01010','10010','11111','00010','00010'],
      '7': ['11111','00001','00010','00100','01000','01000','01000'],
    };
    function clockDigit(c) {
      const rows = CLOCK[c];
      const el = document.createElement('div');
      el.className = 'matrix-digit';
      for (const row of rows) {
        for (const bit of row) {
          const p = document.createElement('span');
          p.className = 'matrix-pixel' + (bit === '1' ? ' on' : '');
          el.appendChild(p);
        }
      }
      return el;
    }
    function clockColon() {
      const el = document.createElement('div');
      el.className = 'matrix-colon';
      for (let r = 0; r < 7; r++) {
        const p = document.createElement('span');
        p.className = 'matrix-pixel' + (r === 2 || r === 4 ? ' on' : '');
        el.appendChild(p);
      }
      return el;
    }

    let playing = false, liked = false, dark = true;

    function ghostIcon(rows, extra = '') {
      const b = document.createElement('div');
      b.className = 'transport ghost-icon' + extra;
      b.appendChild(matrixFrom(rows, 'ghost-icon'));
      return b;
    }

    function renderMock() {
      const root = document.getElementById('appMock');
      root.innerHTML = '';
      root.appendChild(clockGap());
      root.append(Object.assign(document.createElement('p'), { className: 'mock-weekday', textContent: '星期五' }));
      root.append(Object.assign(document.createElement('p'), { className: 'mock-date', textContent: '2026 · JUL · 03' }));
      const st = document.createElement('div');
      st.className = 'mock-status';
      if (playing) {
        const dot = document.createElement('span');
        dot.className = 'live-dot';
        st.append(dot);
      }
      st.append(Object.assign(document.createElement('span'), { textContent: playing ? 'ON AIR' : 'STANDBY' }));
      root.append(st);

      const row = document.createElement('div');
      row.className = 'transport-row';
      if (playing) {
        const ring = document.createElement('span');
        ring.className = 'transport-ring';
        row.append(ring);
      }
      row.append(ghostIcon(G.prev));
      const cluster = document.createElement('div');
      cluster.className = 'transport-cluster';
      cluster.append(
        ghostIcon(G.heart, liked ? ' liked' : ''),
        (() => {
          const pb = document.createElement('div');
          pb.className = 'play-btn' + (playing ? ' live' : '');
          pb.appendChild(matrixFrom(playing ? G.pause : G.play, 'play-icon'));
          return pb;
        })(),
        ghostIcon(G.minus),
      );
      row.append(cluster, ghostIcon(G.next));
      root.append(row);
    }

    /** 7×8 minimal Auri — round dots only */
    const MARK = [
      '...T...',
      '..AAA..',
      '.OOOOO.',
      '.O.E.E.',
      '.O.G.O.',
      '.OOOOO.',
      '..OOO..',
      '...O...',
    ];
    const MC = { T: '#f0fff4', A: '#5ad19a', O: '#ff6a3d', E: '#1a1210', G: '#5ad19a' };

    function squircle(ctx, s, inset, r) {
      const x = inset, y = inset, w = s - inset * 2, h = s - inset * 2;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawDots(ctx, sprite, ox, oy, rd, gap, pal, bloom) {
      for (let y = 0; y < sprite.length; y++) {
        for (let x = 0; x < sprite[y].length; x++) {
          const ch = sprite[y][x];
          if (ch === '.') continue;
          const cx = ox + x * (rd * 2 + gap) + rd;
          const cy = oy + y * (rd * 2 + gap) + rd;
          const col = pal[ch] || pal.O;
          if (bloom && ch === 'O') {
            ctx.beginPath();
            ctx.arc(cx, cy, rd * 2.2, 0, Math.PI * 2);
            ctx.fillStyle = bloom;
            ctx.fill();
          }
          ctx.beginPath();
          ctx.arc(cx, cy, rd, 0, Math.PI * 2);
          ctx.fillStyle = col;
          ctx.fill();
          if (ch === 'O') {
            ctx.beginPath();
            ctx.arc(cx - rd * 0.25, cy - rd * 0.25, rd * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.fill();
          }
        }
      }
    }

    function iconBg(ctx, s, variant) {
      if (variant === 'lumen') {
        const g = ctx.createLinearGradient(0, 0, s * 0.3, s);
        g.addColorStop(0, '#ffffff');
        g.addColorStop(0.35, '#faf7f2');
        g.addColorStop(1, '#e8dfd4');
        ctx.fillStyle = g;
        squircle(ctx, s, s * 0.06, s * 0.22);
        ctx.fill();
        const hi = ctx.createLinearGradient(0, s * 0.06, 0, s * 0.42);
        hi.addColorStop(0, 'rgba(255,255,255,0.9)');
        hi.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = hi;
        squircle(ctx, s, s * 0.06, s * 0.22);
        ctx.fill();
        const sh = ctx.createRadialGradient(s * 0.5, s * 0.85, 0, s * 0.5, s * 0.85, s * 0.35);
        sh.addColorStop(0, 'rgba(0,0,0,0.06)');
        sh.addColorStop(1, 'transparent');
        ctx.fillStyle = sh;
        squircle(ctx, s, s * 0.06, s * 0.22);
        ctx.fill();
        return 'rgba(255,106,61,0.12)';
      }
      const g = ctx.createRadialGradient(s * 0.5, s * 0.35, 0, s * 0.5, s * 0.5, s * 0.7);
      g.addColorStop(0, '#3a3a3e');
      g.addColorStop(0.6, '#222226');
      g.addColorStop(1, '#121214');
      ctx.fillStyle = g;
      squircle(ctx, s, s * 0.06, s * 0.22);
      ctx.fill();
      const warm = ctx.createRadialGradient(s * 0.5, s * 0.65, 0, s * 0.5, s * 0.65, s * 0.4);
      warm.addColorStop(0, 'rgba(255,106,61,0.22)');
      warm.addColorStop(1, 'transparent');
      ctx.fillStyle = warm;
      squircle(ctx, s, s * 0.06, s * 0.22);
      ctx.fill();
      return 'rgba(255,106,61,0.28)';
    }

    function renderIcon(variant, size) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const bloom = iconBg(ctx, size, variant);
      const rd = size * 0.028;
      const gap = size * 0.01;
      const cols = 7, rows = MARK.length;
      const ox = size * 0.5 - (cols * (rd * 2 + gap) - gap) / 2;
      const oy = size * 0.52 - (rows * (rd * 2 + gap) - gap) / 2;
      drawDots(ctx, MARK, ox, oy, rd, gap, MC, bloom);
      squircle(ctx, size, size * 0.06 + 0.5, size * 0.22);
      ctx.strokeStyle = variant === 'lumen' ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.08)';
      ctx.lineWidth = size * 0.004;
      ctx.stroke();
      return c;
    }

    function renderApps() {
      const row = document.getElementById('iconsRow');
      const dock = document.getElementById('dock');
      row.innerHTML = '';
      dock.innerHTML = '';
      for (let i = 0; i < 2; i++) { const f = document.createElement('div'); f.className = 'dock-f'; dock.appendChild(f); }
      for (const [k, label] of [['lumen', 'Lumen · 推荐'], ['ember', 'Ember']]) {
        const box = document.createElement('div');
        box.className = 'ic';
        const big = renderIcon(k, 512);
        big.style.width = big.style.height = '112px';
        box.append(big, Object.assign(document.createElement('small'), { textContent: label }));
        row.appendChild(box);
        dock.appendChild(renderIcon(k, 128));
      }
      for (let i = 0; i < 2; i++) { const f = document.createElement('div'); f.className = 'dock-f'; dock.appendChild(f); }
    }

    const TRAY = [
      '..O..',
      '.OOO.',
      '.OOO.',
      '.O.O.',
      '..O..',
    ];

    function renderTray(c, { active = false, dim = false } = {}) {
      const S = 18;
      c.width = c.height = S;
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, S, S);
      if (active) {
        ctx.fillStyle = 'rgba(90,209,154,0.9)';
        ctx.fillRect(2, S - 2, S - 4, 1.2);
      }
      const rd = 1.05;
      const gap = 0.75;
      const ox = (S - (5 * (rd * 2 + gap) - gap)) / 2;
      const oy = (S - (5 * (rd * 2 + gap) - gap)) / 2 + 0.5;
      ctx.fillStyle = dim ? 'rgba(255,255,255,0.38)' : 'rgba(255,255,255,0.9)';
      for (let y = 0; y < TRAY.length; y++) {
        for (let x = 0; x < TRAY[y].length; x++) {
          if (TRAY[y][x] === '.') continue;
          const cx = ox + x * (rd * 2 + gap) + rd;
          const cy = oy + y * (rd * 2 + gap) + rd;
          ctx.beginPath();
          ctx.arc(cx, cy, rd, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function renderTrays() {
      renderTray(document.getElementById('trayLive'), { active: playing });
      const t = document.getElementById('trays');
      t.innerHTML = '';
      [['默认', {}], ['淡', { dim: true }], ['播放', { active: true }]].forEach(([label, opts]) => {
        const w = document.createElement('div');
        const c = document.createElement('canvas');
        renderTray(c, opts);
        w.append(c, Object.assign(document.createElement('span'), { textContent: label }));
        t.appendChild(w);
      });
    }

    document.getElementById('cTheme').onclick = (e) => {
      dark = !dark;
      document.body.dataset.theme = dark ? 'dark' : 'light';
      e.target.textContent = dark ? '浅色' : '深色';
      renderMock();
    };
    document.getElementById('cPlay').onclick = (e) => {
      playing = !playing;
      e.target.classList.toggle('on', playing);
      renderMock();
      renderTrays();
    };
    document.getElementById('cLike').onclick = (e) => {
      liked = !liked;
      e.target.classList.toggle('on', liked);
      renderMock();
    };

    renderMock();
    renderApps();
    renderTrays();
  </script>
</body>
</html>
